# Manifest pin for the AOTriton flash-attention runtime used by the gfx11
# attention wrapper.  hipEngine vendors a pruned copy of this pin under
# aotriton_runtime/<version>/ and tracks the binary/image payloads with Git LFS.
# The fetch helper at scripts/fetch_aotriton.sh remains the refresh/offline-cache
# tool for bumping or replacing the vendored tree.  See docs/PREFILL.md
# "AOTriton distribution and pinning strategy" for the rationale and lookup
# chain.
#
# Bumping version: update [aotriton].version, update both [[aotriton.archives]]
# urls + sha256 + size_bytes, refresh so_name from `readelf -d` of the new .so,
# adjust rocm_min/rocm_max to the release's supported band, re-run the fetcher,
# prune/vendor the required runtime/images, re-build the wrapper, re-run the
# fixture gate.

[aotriton]
version = "0.11.2b"
source_ref = "0.11.2b"
# SONAME emitted by readelf -d libaotriton_v2.so.0.11.2 (0.11.2b runtime,
# rocm7.0 build).  The unversioned libaotriton_v2.so symlink resolves here.
so_name = "libaotriton_v2.so.0.11.2"
# 0.11.2b "rocm7.0-shared" build NEEDS libamdhip64.so.7 directly; no compat
# shim required when the host ROCm is 7.x.
rocm_min = "7.0"
rocm_max = "7.x"

# Two-tarball release layout (changed from 0.8.x): one small runtime tarball
# (lib + headers) plus a per-arch GPU-image tarball.  Both extract to the same
# `aotriton/` root and merge cleanly.

[[aotriton.archives]]
kind = "runtime"
url = "https://github.com/ROCm/aotriton/releases/download/0.11.2b/aotriton-0.11.2b-manylinux_2_28_x86_64-rocm7.0-shared.tar.gz"
sha256 = "5501a0a3b300890001b6625f2a3539a7bad60f386f0a061ebe7d4ed5ca0fafb9"
size_bytes = 4884827

[[aotriton.archives]]
kind = "images"
arch = "amd-gfx11xx"
url = "https://github.com/ROCm/aotriton/releases/download/0.11.2b/aotriton-0.11.2b-images-amd-gfx11xx.tar.gz"
sha256 = "839299637fccb13fbe3e7823d57d1b2dcd0e0bed78abbcb7005ea5f4fd82b928"
size_bytes = 475390993

[aotriton.prune]
# Fetch-cache pruning keeps only the forward-attention kernel family.  AOTriton
# ships forward kernels (attn_fwd), backward/training kernels (bwd_*), and debug
# helpers in the gfx11xx image tarball; hipEngine is inference-only.
keep_flash_subdirs = ["attn_fwd"]
# Restrict to the gfx11xx image tree.  AOTriton 0.11.x ships one image tarball
# per architecture family; future fetches may add more.
keep_archs = ["amd-gfx11xx"]

[aotriton.vendor]
# The committed baseline runtime is stricter than the external fetch cache:
# lib/header runtime plus only BF16 head_dim=256 gfx11xx forward-attention
# images used by Qwen3.5/PARO AOTriton prefill.  Binary payloads are Git LFS
# objects; run `git lfs pull` after clone if they are missing.
relative_path = "aotriton_runtime/0.11.2b"
image_glob = "lib/aotriton.images/amd-gfx11xx/flash/attn_fwd/FONLY__＊bf16@16_256_*___gfx11xx.aks2"
image_count = 12
